<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB Success - Simple Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F0F4FF;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2563EB;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #2563EB;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #1d4ed8;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: green;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JAMB Success - Test Page</h1>
        <p>This is a simple test to ensure the website displays properly.</p>
        
        <!-- Login Form -->
        <div id="login-section">
            <h2>Login</h2>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button onclick="testLogin()">Login</button>
            <div id="message" class="error"></div>
        </div>
        
        <!-- Dashboard (hidden by default) -->
        <div id="dashboard" class="hidden">
            <h2>Welcome to JAMB Success!</h2>
            <p>You are now logged in.</p>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
                <div style="background: #EFF6FF; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Mathematics</h3>
                    <p>Learn math concepts</p>
                    <button onclick="alert('Math section coming soon!')">Start</button>
                </div>
                <div style="background: #ECFDF5; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>English</h3>
                    <p>Improve English skills</p>
                    <button onclick="alert('English section coming soon!')">Start</button>
                </div>
                <div style="background: #FEF2F2; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Physics</h3>
                    <p>Study physics topics</p>
                    <button onclick="alert('Physics section coming soon!')">Start</button>
                </div>
                <div style="background: #F3E8FF; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Chemistry</h3>
                    <p>Learn chemistry concepts</p>
                    <button onclick="alert('Chemistry section coming soon!')">Start</button>
                </div>
            </div>
            <button onclick="logout()" style="background: #DC2626; margin-top: 20px;">Logout</button>
        </div>
    </div>

    <script>
        function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            if (!email || !password) {
                message.textContent = 'Please enter email and password';
                message.className = 'error';
                return;
            }
            
            // Simulate login (replace with real Supabase later)
            if (email && password) {
                message.textContent = 'Login successful!';
                message.className = 'success';
                
                // Show dashboard after 1 second
                setTimeout(() => {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                }, 1000);
            }
        }
        
        function logout() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('message').textContent = '';
        }
        
        // Test that page loads
        console.log('Simple JAMB page loaded successfully');
    </script>
</body>
</html>
